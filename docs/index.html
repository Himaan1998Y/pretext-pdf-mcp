let activeTab = 'invoice'

const generateBtn = document.getElementById('generateBtn')
const errorBar = document.getElementById('errorBar')
const preview = document.getElementById('preview')

const loadingOverlay = document.getElementById('loadingOverlay')
const downloadBtn = document.getElementById('downloadBtn')

function setTab(tab) {
  activeTab = tab
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
  editor.value = JSON.stringify(TEMPLATES[tab], null, 2)
  errorBar.classList.remove('show')
  generatePdf()
}

async function generatePdf() {
  errorBar.classList.remove('show')

  let data
  try {
    data = JSON.parse(editor.value)
  } catch (e) {
    errorBar.textContent = '⚠ JSON parse error: ' + e.message
    errorBar.classList.add('show')
    return
  }

  generateBtn.disabled = true
  generateBtn.classList.add('loading')
  placeholder.classList.add('hidden')
  preview.style.display = 'none'
  loadingOverlay.classList.add('show')
  downloadBtn.classList.remove('show')
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl)

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    })

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }))
      throw new Error(err.error || res.statusText)
    }

    const blob = await res.blob()
    currentBlobUrl = URL.createObjectURL(blob)
    preview.src = currentBlobUrl
    preview.style.display = 'block'
    downloadBtn.href = currentBlobUrl
    downloadBtn.download = activeTab + '.pdf'
    downloadBtn.classList.add('show')
  } catch (e) {
    errorBar.textContent = '⚠ ' + e.message
    errorBar.classList.add('show')
    placeholder.classList.remove('hidden')
  } finally {
    generateBtn.disabled = false
    generateBtn.classList.remove('loading')
    loadingOverlay.classList.remove('show')
  }
}

// Tab clicks
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => setTab(tab.dataset.tab))
})

// Ctrl+Enter to generate
editor.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generatePdf()
})

// Resizer
const resizer = document.getElementById('resizer')
const editorPane = document.getElementById('editorPane')
let isResizing = false

resizer.addEventListener('mousedown', e => {
  isResizing = true
  document.body.style.cursor = 'col-resize'
  document.body.style.userSelect = 'none'
})
document.addEventListener('mousemove', e => {
  if (!isResizing) return
  const workspace = document.querySelector('.workspace')
  const rect = workspace.getBoundingClientRect()
  const newWidth = Math.max(280, Math.min(e.clientX - rect.left, rect.width - 280))
  editorPane.style.width = newWidth + 'px'
})
document.addEventListener('mouseup', () => {
  isResizing = false
  document.body.style.cursor = ''
  document.body.style.userSelect = ''
})

// Init
setTab('invoice')
</script>
</body>
